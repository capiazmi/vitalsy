<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · BP Monitor</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f3faf5;
        color: #173a40;
      }
      .card {
        text-align: center;
        padding: 2rem;
      }
      .badge {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #0f766e;
        margin: 0 auto 1rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        border: 0;
        border-radius: 8px;
        background: #0f766e;
        color: #fff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"></div>
      <h1>You're offline</h1>
      <p>BP Monitor needs a connection to load your readings.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
