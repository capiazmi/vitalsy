# Full local Docker stack.
#
# Starts:
#   - app       http://localhost:3000
#   - postgres localhost:5432
#   - minio    http://localhost:9000      (S3 API)
#   - minio    http://localhost:9001      (console)
#
# Optional local Ollama OCR:
#   docker compose --profile ollama up -d --build
#
# For normal host-based development with HMR, you can still run only the
# third-party services:
#   docker compose up -d postgres minio minio-init
#   pnpm dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/bpmonitor?schema=public}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}

      # OCR defaults to the bundled offline Tesseract model. To use local
      # Ollama, set OCR_PROVIDER=ollama and start with: --profile ollama.
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      OCR_LANG: ${OCR_LANG:-ssd}
      OCR_TESSDATA_PATH: ${OCR_TESSDATA_PATH:-tessdata}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_OCR_MODEL: ${ANTHROPIC_OCR_MODEL:-claude-opus-4-8}
      OLLAMA_HOST: ${OLLAMA_HOST_DOCKER:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-qwen2.5vl}

      # MinIO is the free, self-hosted S3-compatible store for OCR images.
      S3_ENDPOINT: ${S3_ENDPOINT_DOCKER:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-vitalsy-ocr}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bpmonitor}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - bp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bpmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-vitalsy-ocr}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc ready local >/dev/null 2>&1; do sleep 2; done &&
      mc mb --ignore-existing \"local/$${S3_BUCKET}\" &&
      mc anonymous set download \"local/$${S3_BUCKET}\"
      "
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    profiles:
      - ollama
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-qwen2.5vl}
    entrypoint: >
      /bin/sh -c "
      until ollama list >/dev/null 2>&1; do sleep 2; done &&
      ollama pull \"$${OLLAMA_OCR_MODEL}\"
      "
    restart: "no"

volumes:
  bp_postgres_data:
  minio_data:
  ollama_data:
